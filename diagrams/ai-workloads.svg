<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 430" font-family="Segoe UI, Arial, sans-serif" role="img" aria-label="Common AI workloads">
<rect width="900" height="430" fill="#ffffff"/>
<defs><marker id="arr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#5b6b7b"/></marker></defs>
<text x="450.0" y="34" text-anchor="middle" font-size="22" font-weight="600" fill="#16324f">Common AI workloads</text>
<rect x="40" y="75" width="152" height="190" rx="10" fill="#e8f1fb" stroke="#0b5cab" stroke-width="2"/>
<text x="116" y="115" text-anchor="middle" font-size="14" font-weight="600" fill="#0b5cab">Generative AI</text>
<text x="116" y="135" text-anchor="middle" font-size="14" font-weight="600" fill="#0b5cab">&amp; agents</text>
<text x="116" y="170" text-anchor="middle" font-size="11.5" font-weight="normal" fill="#5b6b7b">Create content; act</text>
<text x="116" y="189" text-anchor="middle" font-size="11.5" font-weight="normal" fill="#5b6b7b">on a user&#x27;s behalf</text>
<rect x="208" y="75" width="152" height="190" rx="10" fill="#e3f5f5" stroke="#038387" stroke-width="2"/>
<text x="284" y="115" text-anchor="middle" font-size="14" font-weight="600" fill="#038387">Text &amp;</text>
<text x="284" y="135" text-anchor="middle" font-size="14" font-weight="600" fill="#038387">language</text>
<text x="284" y="170" text-anchor="middle" font-size="11.5" font-weight="normal" fill="#5b6b7b">Infer meaning from</text>
<text x="284" y="189" text-anchor="middle" font-size="11.5" font-weight="normal" fill="#5b6b7b">written language</text>
<rect x="376" y="75" width="152" height="190" rx="10" fill="#f3ecfe" stroke="#7a3ee8" stroke-width="2"/>
<text x="452" y="115" text-anchor="middle" font-size="14" font-weight="600" fill="#7a3ee8">Computer</text>
<text x="452" y="135" text-anchor="middle" font-size="14" font-weight="600" fill="#7a3ee8">speech</text>
<text x="452" y="170" text-anchor="middle" font-size="11.5" font-weight="normal" fill="#5b6b7b">Recognize &amp;</text>
<text x="452" y="189" text-anchor="middle" font-size="11.5" font-weight="normal" fill="#5b6b7b">synthesize spoken</text>
<text x="452" y="208" text-anchor="middle" font-size="11.5" font-weight="normal" fill="#5b6b7b">language</text>
<rect x="544" y="75" width="152" height="190" rx="10" fill="#e6f4e6" stroke="#107c10" stroke-width="2"/>
<text x="620" y="115" text-anchor="middle" font-size="14" font-weight="600" fill="#107c10">Computer</text>
<text x="620" y="135" text-anchor="middle" font-size="14" font-weight="600" fill="#107c10">vision</text>
<text x="620" y="170" text-anchor="middle" font-size="11.5" font-weight="normal" fill="#5b6b7b">Interpret images and</text>
<text x="620" y="189" text-anchor="middle" font-size="11.5" font-weight="normal" fill="#5b6b7b">video</text>
<rect x="712" y="75" width="152" height="190" rx="10" fill="#fdeee3" stroke="#c74e0c" stroke-width="2"/>
<text x="788" y="115" text-anchor="middle" font-size="14" font-weight="600" fill="#c74e0c">Information</text>
<text x="788" y="135" text-anchor="middle" font-size="14" font-weight="600" fill="#c74e0c">extraction</text>
<text x="788" y="170" text-anchor="middle" font-size="11.5" font-weight="normal" fill="#5b6b7b">Turn documents &amp;</text>
<text x="788" y="189" text-anchor="middle" font-size="11.5" font-weight="normal" fill="#5b6b7b">media into data</text>
<rect x="40" y="295" width="820" height="95" rx="10" fill="#10324f" stroke="#10324f" stroke-width="2"/>
<text x="450" y="335" text-anchor="middle" font-size="17" font-weight="600" fill="#ffffff">Machine learning   —   f(x) = y</text>
<text x="450" y="362" text-anchor="middle" font-size="13" font-weight="normal" fill="#cfe0f0">Models trained on historic data underpin every AI workload</text>
