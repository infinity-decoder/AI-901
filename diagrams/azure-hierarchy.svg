<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 460" font-family="Segoe UI, Arial, sans-serif" role="img" aria-label="Microsoft Azure: organizational hierarchy">
<rect width="900" height="460" fill="#ffffff"/>
<defs><marker id="arr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#5b6b7b"/></marker></defs>
<text x="450.0" y="34" text-anchor="middle" font-size="22" font-weight="600" fill="#16324f">Microsoft Azure: organizational hierarchy</text>
<rect x="60" y="60" width="780" height="370" rx="10" fill="#f4f8fd" stroke="#0b5cab" stroke-width="2"/>
<text x="140" y="90" text-anchor="middle" font-size="17" font-weight="600" fill="#0b5cab">Tenant</text>
